/* ==== SHIFT TIMELINE  ==== */

/* ===== CLOCK ===== */

#shiftClock {
  text-align: center;
  margin-bottom: 30px;
}

#currentTimeDisplay {
  font-size: 48px;

.current-time-marker {

/* ===== TIMESCALE ===== */

#timeScale {

  /*border:1px solid blue;*/

/* Dotted vertical timeline */
.timeline-line {
  position: absolute;
  left: 70px;
  top: 0;
  width: 2px;

    to bottom,
    #bbb 0px,

/* Hour labels */
.time-label {
  position: absolute;

label.completed {

.build-btn {

  background: #007aff;
  color: #fff;

#dialImg {
  display: none;
}
#dialImg img {
  width:100%;

</style>

<h2>Pulled Pork Widgets</h2>

<div class="label-widget" id="panWidget">

<!-- PORK BUTT LOADING VISUALIZER -->
<h2>Pork Butt Balancer</h2>

<br>
<div><b>How many cases of pork butts to load?</b></div>
<br>
<br>

<input type="number" id="cases" placeholder="Enter number of cases" min="1">
<button onclick="loadMeat()">Submit</button>

<div id="summary"></div>
<div class="visualizer" id="visualizer"></div>

<br>

  ⚠️ Set smoker dial to 215°F

<script>

// Format Time
function formatTime(date){
  return date.toLocaleTimeString([],{
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  });
}

/* ============================
  PORK BUTT LOADING VISUALIZER
================================*/
function loadMeat() {
  const cases = parseInt(document.getElementById('cases').value);
  if (!cases || cases < 1) return;
  if (cases > 12) return;

  const totalMeats = cases * 8;
  const sets = 5;

  let meatsPerSet = Math.floor(totalMeats / sets);
  let remainder = totalMeats % sets;

  const distribution = [];

  for (let i = 0; i < sets; i++) {
    let meats = meatsPerSet + (i < remainder ? 1 : 0);
    distribution.push(distributeToRacks(meats));
  }

  renderSummary(cases, totalMeats, meatsPerSet, remainder);
  renderVisualizer(distribution);
}

function distributeToRacks(meats) {
  const racks = [0,0,0,0]; // 1(top),2,3,4(bottom)

  // Determine max capacity per rack
  const maxPerRack = meats > 8 ? 5 : 4;

  // Decide which racks are active
  let activeRacks = [1,2]; // rack 2 and 3 (0-based index: 1,2)

  if (meats > 10) activeRacks.push(3); // add rack 4
  if (meats > 15) activeRacks.push(0); // add rack 1

  let remaining = meats;

  // Even vertical distribution
  while (remaining > 0) {
    for (let r of activeRacks) {
      if (remaining === 0) break;
      if (racks[r] < maxPerRack) {
        racks[r]++;
        remaining--;
      }
    }
  }

  return racks;
}

function renderSummary(cases, totalMeats, meatsPerSet, remainder) {
    
    let warning = "";
    if (cases < 8) {
      warning = "⚠️ Leave top rack empty";
    }

    document.getElementById('summary').innerHTML =
    `<strong>${cases} cases</strong> = ${totalMeats} meats<br>
     Evenly spread across 5 sets<br>
     ${meatsPerSet}${remainder ? "–" + (meatsPerSet+1) : ""} meats per set<br>
     ${warning}`;

     // show the dial image
     document.getElementById("dialImg").style.display = "block";

}

function renderVisualizer(distribution) {
  const container = document.getElementById('visualizer');
  container.innerHTML = "";

  distribution.forEach(racks => {
    const setDiv = document.createElement("div");
    setDiv.className = "set";

    racks.forEach(count => {
      const rackBar = document.createElement("div");
      rackBar.className = "rack-bar";
      if (count > 4) rackBar.classList.add("shrink");

      for (let i = 0; i < count; i++) {
        const meat = document.createElement("div");
        meat.className = "meat";
        rackBar.appendChild(meat);
      }

      setDiv.appendChild(rackBar);
    });

    container.appendChild(setDiv);
  });
}


/* =================
  LABEL GENERATOR 
  ================== */
function formatDate(date) {
  const month = date.getMonth() + 1;
  const day = date.getDate();
  return `${month}-${day.toString().padStart(2, '0')}`;
}

function generateDates() {
  const today = new Date();

  const useBy = new Date();
  useBy.setDate(today.getDate() + 6); // auto handles month/year rollover

  document.getElementById("todayDate").textContent = formatDate(today);
  document.getElementById("useByDate").textContent = formatDate(useBy);
}

// Auto-generate on page load
generateDates();


/* ====================
  SHIFT TIMELINE
=======================*/

function formatMilestoneTime(date){
  return date.toLocaleTimeString([],{
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  }).replace(/\s?(AM|PM)/i, '');
}

function startLiveShiftSystem(containerId, shiftStartHour = 9, shiftEndHour = 17, pixelsPerMinute = 4) {

  const container = document.getElementById(containerId);

  const marker = document.createElement("div");
  marker.className = "current-time-marker";
  container.appendChild(marker);

  function update() {

    const now = new Date();

    /* =========================
       1️⃣ BIG TIME DISPLAY
    ========================== */

    const timeString = now.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit",
      hour12: true
    });

    document.getElementById("currentTimeDisplay").textContent = timeString;

    /* =========================
       2️⃣ SHIFT STATUS LOGIC
    ========================== */

    const shiftStart = new Date();
    shiftStart.setHours(shiftStartHour, 0, 0, 0);

    const shiftEnd = new Date();
    shiftEnd.setHours(shiftEndHour, 0, 0, 0);

    const statusEl = document.getElementById("shiftStatus");

    if (now < shiftStart) {

      const diff = shiftStart - now;
      statusEl.textContent = formatDuration(diff) + " until next shift";

    } else if (now >= shiftStart && now <= shiftEnd) {

      const diff = shiftEnd - now;
      statusEl.textContent = formatDuration(diff) + " remaining";

    } else {

      //statusEl.textContent = "Shift complete for today";
      statusEl.textContent = "Today's shift has ended";

    }

    /* =========================
       MARKER VISIBILITY + POSITION
    ========================== */

    if (now >= shiftStart && now <= shiftEnd) {

      marker.style.display = "block";

      const minutesFromStart =
        (now.getHours() - shiftStartHour) * 60 + now.getMinutes();

      const offset = minutesFromStart * pixelsPerMinute;

      marker.style.top = offset + "px";

    } else {

      marker.style.display = "none";

    }
  }

  function formatDuration(ms) {
    const totalSeconds = Math.floor(ms / 1000);

    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return (
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0")
    );
  }

  update();
  setInterval(update, 1000);
}


function renderVerticalTimeScale(containerId, startHour = 9, endHour = 17, pixelsPerMinute = 2) {

  pixelsPerMinute = 4;

  const container = document.getElementById(containerId);
  container.innerHTML = "";

  const totalMinutes = (endHour - startHour) * 60;
  const totalHeight = totalMinutes * pixelsPerMinute;

  container.style.height = totalHeight + "px";

  /* Vertical dotted line */
  const line = document.createElement("div");
  line.className = "timeline-line";
  line.style.height = totalHeight + "px";
  container.appendChild(line);

  /* Create ticks + labels */
  for (let minutes = 0; minutes <= totalMinutes; minutes += 15) {

    const offset = minutes * pixelsPerMinute;

    const tick = document.createElement("div");
    tick.className = "tick";
    tick.style.top = offset + "px";

    if (minutes % 60 === 0) {
      tick.classList.add("hour");

      const hour = startHour + minutes / 60;
      const suffix = hour >= 12 ? "PM" : "AM";
      const displayHour = hour > 12 ? hour - 12 : hour;

      const label = document.createElement("div");
      label.className = "time-label";
      label.style.top = (offset - 6) + "px";
      label.textContent = `${displayHour}:00 ${suffix}`;

      container.appendChild(label);
    }

    container.appendChild(tick);
  }
}

async function renderShiftMilestones(containerId, jsonPath) {

  const container = document.getElementById(containerId);

  const response = await fetch(jsonPath);
  const data = await response.json();

  const pixelsPerMinute = 4;

  const startHour = parseInt(data.shiftStart.split(":")[0]);
  const startMinutes = startHour * 60;

  // reset at midnight UTC
  // const todayKey = new Date().toISOString().split("T")[0];

  // reset at midight local time
  const now = new Date();
  const todayKey =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0");
  const storageKey = "shiftChecklist_" + todayKey;

  const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");

  const milestones = data.milestones;

  for (let i = 0; i < milestones.length; i++) {

    const ms = milestones[i];
    const [h, m] = ms.time.split(":").map(Number);
    const totalMinutes = (h * 60 + m) - startMinutes;
    const offset = totalMinutes * pixelsPerMinute;

    /* =======================
       MILESTONE MARKER
    ======================== */

    const wrap = document.createElement("div");
    wrap.style.position = "absolute";
    wrap.style.top = offset + "px";
    wrap.style.left = "90px";
    wrap.style.transform = "translateY(-50%)";

    // format the display time
    const [hour, minute] = ms.time.split(":").map(Number);
    const milestoneDate = new Date();
    milestoneDate.setHours(hour, minute, 0, 0);
    let dispTime = formatMilestoneTime(milestoneDate);

    wrap.innerHTML = `
      <div style="
        position:absolute;
        left:-20px;
        top:50%;
        transform:translateY(-50%);
        width:10px;
        height:10px;
        background:#000;
        border-radius:50%;">
      </div>
      <div style="
        position:absolute;
        left:-10px;
        top:50%;
        transform:translateY(-50%);
        width:40px;
        height:3px;
        background:#000;">
      </div>
      <div style="
        margin-left:30px;
        font-size:14px;
        font-weight:700;
        background-color:#000;
        color:#fff;
        padding: 6px;">
        ${dispTime} • ${ms.label}
      </div>
    `;

    container.appendChild(wrap);

    /* =======================
       CONTENT BLOCK
    ======================== */

    if (i < milestones.length - 1) {

      const next = milestones[i + 1];
      const [nh, nm] = next.time.split(":").map(Number);
      const nextMinutes = (nh * 60 + nm) - startMinutes;
      const nextOffset = nextMinutes * pixelsPerMinute;

      const block = document.createElement("div");
      block.style.className = "checklist-item";
      block.style.position = "absolute";
      block.style.left = "120px";
      block.style.right = "0";
      block.style.top = (offset + 20) + "px";
      block.style.height = (nextOffset - offset - 40) + "px";
      /*block.style.background = "#eee";*/
      /*block.style.padding = "20px";*/
      block.style.display = "flex";
      block.style.flexDirection = "column";
      block.style.gap = "6px"; // vertical spacing
      block.style.overflow = "scroll";

      ms.checklist.forEach((item, index) => {

        const id = ms.id + "_" + index;

        const label = document.createElement("label");
        label.style.display = "flex";
        label.style.alignItems = "center";
        label.style.gap = "8px";
        label.style.fontSize = "12px";
        
        /*label.style.border = "1px solid red";*/

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.style.width = "18px";
        checkbox.style.height = "18px";


        checkbox.checked = saved[id] || false;

        // strikethrough?
        if (checkbox.checked) {
          label.classList.add("completed");
        }

        checkbox.addEventListener("change", () => {
          const updated = JSON.parse(localStorage.getItem(storageKey) || "{}");
          updated[id] = checkbox.checked;
          localStorage.setItem(storageKey, JSON.stringify(updated));

          // toggle strikethrough
          label.classList.toggle("completed", checkbox.checked);

        });

        label.appendChild(checkbox);
        label.append(item);

        block.appendChild(label);
      });

      container.appendChild(block);
    }
  }
}

/* Render */
renderVerticalTimeScale("timeScale");
renderShiftMilestones("timeScale", "shift-timeline.json");
startLiveShiftSystem("timeScale");


/* =====================
  PULLED PORK PANS
========================= */

function calculatePans() {

  const cases = parseInt(document.getElementById("casesLoaded").value);

  if (isNaN(cases) || cases < 0) return;

  const meatsPerCase = 8;
  const meatsPerPan = 3;

  const totalMeats = cases * meatsPerCase;

  // Always round up final pan count
  const pans = Math.ceil(totalMeats / meatsPerPan);

  document.getElementById("panResult").innerHTML = `
    <strong>${cases} case${cases !== 1 ? "s" : ""}</strong><br><br>
    ${cases} × 8 meats = ${totalMeats} meats<br>
    ${totalMeats} meats ÷ 3 meats per pan = <strong>${pans} pans</strong><br><br>
    <strong>Final Output: ${pans} pans of pulled pork</strong>
  `;
}

/* ========================
  PULLED PORK CALCULATOR
=========================== */

let buildTarget = 30; // default

// Toggle buttons
document.querySelectorAll(".build-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".build-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    buildTarget = parseInt(btn.dataset.target);
  });
});

function calculateBuild() {

  const current = parseInt(document.getElementById("currentPans").value);
  if (isNaN(current) || current < 0) return;

  const meatsPerCase = 8;
  const meatsPerPan = 3;

  const pansNeeded = Math.max(0, buildTarget - current);

  if (pansNeeded === 0) {
    document.getElementById("buildResult").innerHTML =
      `<strong>You're already at ${current} pans.</strong><br>
       No additional cases needed to reach ${buildTarget}+.`;
    return;
  }

  // Convert pans needed to meats
  const meatsNeeded = pansNeeded * meatsPerPan;

  // Convert meats to cases (round up)
  const casesNeeded = Math.ceil(meatsNeeded / meatsPerCase);

  // Calculate actual pans produced from those cases
  const actualPansProduced = Math.ceil((casesNeeded * meatsPerCase) / meatsPerPan);

  const finalTotal = current + actualPansProduced;

  document.getElementById("buildResult").innerHTML = `
    <strong>Recommendation: Load ${casesNeeded} case${casesNeeded > 1 ? "s" : ""}</strong><br><br>
    Build Target: ${buildTarget}+ pans<br>
    Current: ${current} pans<br>
    Needed: ${pansNeeded} pans<br><br>
    ${casesNeeded} cases × 8 meats = ${casesNeeded * meatsPerCase} meats<br>
    ${casesNeeded * meatsPerCase} meats ÷ 3 meats per pan = ${actualPansProduced} pans<br><br>
    Final total: <strong>${finalTotal} pans</strong>
  `;
}

</script>
