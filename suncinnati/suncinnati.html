/* =========================
   TOP BAR
========================= */

#topBar{
  position:sticky;
  top:0;

  gap:10px;
  padding:14px 16px;
  background:#0f172a;

  padding-top: calc(14px + env(safe-area-inset-top));

  grid-template-columns: 1fr 1fr 1fr; /* left / center / right */

  align-items: center;
  justify-content: space-between;
}

/* ====== LOGO ROW ====== */

<script>

const lat = 39.1111;
const lon = -84.4304;

/* =========================
   DATE / TIME
========================= */

let lastRefreshTime = null;
let elapsedTimer = null;

function updateDateTime(){
  const now = new Date();
  document.getElementById("dateLine").innerText =
    now.toLocaleDateString([],{
      weekday:'long',month:'short',day:'numeric'
    });
  document.getElementById("timeLine").innerText = "at " +
    formatTime(now);
}
updateDateTime();

// Format Time
function formatTime(date){
  return date.toLocaleTimeString([],{
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  });
}

// Elapsed Timer
function startElapsedTimer() {
    lastRefreshTime = new Date();

    // Clear existing timer if it exists
    if (elapsedTimer) {
        clearInterval(elapsedTimer);
    }

    function updateElapsed() {
        const now = new Date();
        const seconds = Math.floor((now - lastRefreshTime) / 1000);

        let text;

        if (seconds < 60) {
            text = `Last updated ${seconds} second${seconds !== 1 ? 's' : ''} ago`;
        } else {
            const minutes = Math.floor(seconds / 60);
            text = `Last updated ${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
        }

        document.getElementById("lastUpdated").textContent = text;
    }

    updateElapsed(); // Run immediately
    elapsedTimer = setInterval(updateElapsed, 30 * 1000); // Update every 30s
}


// -----------------------------------------------------------


const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}
&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,uv_index
&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset
&hourly=uv_index
&temperature_unit=fahrenheit
&wind_speed_unit=mph
&timezone=auto`;

fetch(url)
.then(res => res.json())
.then(data => {

    /* ---------------- Weather ---------------- */

    const tempF = Math.round(data.current.temperature_2m);

    document.getElementById("temp").textContent =
        tempF + "°F";

        weatherCodeToText(data.current.weather_code);

    //document.getElementById("highlow").textContent =
    //    Math.round(data.daily.temperature_2m_max[0]) + "°F / " +
    //    Math.round(data.daily.temperature_2m_min[0]) + "°F";

    document.getElementById("wind").textContent =
        "Wind: " + Math.round(data.current.wind_speed_10m) + " mph";

    document.getElementById("humidity").textContent =
        "Humidity: " + data.current.relative_humidity_2m + "%";


    updateThermometer(tempF);

    /* ---------------- Solar ---------------- */

    const sunrise = new Date(data.daily.sunrise[0]);
    const sunset = new Date(data.daily.sunset[0]);

    document.getElementById("sunriseLabel").innerHTML = 
        "Sunrise<br>" + formatTime(sunrise);
    document.getElementById("sunsetLabel").innerHTML = 
        "Sunset<br>" + formatTime(sunset);

    const solarNoon = new Date((sunrise.getTime() + sunset.getTime()) / 2);
    document.getElementById("solarNoonLabel").innerHTML = 
        "Solar Noon<br>" + formatTime(solarNoon);

    /* ---------------- UV ---------------- */

    updateUVIndex(data.current.uv_index);

    const hourlyUV = data.hourly.uv_index;
    const hourlyTimes = data.hourly.time.map(t => new Date(t));

    const today = new Date();
    today.setHours(0,0,0,0);

    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);

    function findUVWindowForToday(threshold, requirePositive=false) {
        let start = null;
        let end = null;

        for (let i = 0; i < hourlyUV.length; i++) {
            const time = hourlyTimes[i];

            // Only use today's data
            if (time >= today && time < tomorrow) {

                const uv = hourlyUV[i];

                // Optional guard to avoid counting UV = 0 at night
                const meetsThreshold = requirePositive
                    ? uv > threshold
                    : uv >= threshold;

                if (meetsThreshold) {
                    if (!start) start = time;
                    end = time;
                }
            }
        }

        if (!start) return "None";

        return { start, end };
    }

    // UVA: any measurable UV (> 0)
    const uvaWindow = findUVWindowForToday(0, true);

    // UVB: UV ≥ 3
    const uvbWindow = findUVWindowForToday(3);

    document.getElementById("centerUVA").textContent = "UVA: " + formatTime(uvaWindow.start) + " – " + formatTime(uvaWindow.end);
    document.getElementById("centerUVB").textContent = "UVB: " + formatTime(uvbWindow.start) + " – " + formatTime(uvbWindow.end);

    /* ---------------- Accurate Solar Elevation ---------------- */

    function getSolarElevation(date, latitude, longitude) {

        const rad = Math.PI / 180;

        const day = Math.floor(
            (Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) -
             Date.UTC(date.getFullYear(), 0, 0)) / 86400000
        );

        const time = date.getHours() +
                     date.getMinutes() / 60 +
                     date.getSeconds() / 3600;

        // Fractional year (radians)
        const gamma = 2 * Math.PI / 365 *
            (day - 1 + (time - 12) / 24);

        // Equation of time (minutes)
        const eqTime =
            229.18 * (
                0.000075 +
                0.001868 * Math.cos(gamma) -
                0.032077 * Math.sin(gamma) -
                0.014615 * Math.cos(2 * gamma) -
                0.040849 * Math.sin(2 * gamma)
            );

        // Solar declination (radians)
        const decl =
            0.006918 -
            0.399912 * Math.cos(gamma) +
            0.070257 * Math.sin(gamma) -
            0.006758 * Math.cos(2 * gamma) +
            0.000907 * Math.sin(2 * gamma) -
            0.002697 * Math.cos(3 * gamma) +
            0.00148 * Math.sin(3 * gamma);

        // Time offset
        const timezoneOffset = -date.getTimezoneOffset() / 60;
        const timeOffset = eqTime + 4 * longitude - 60 * timezoneOffset;

        const trueSolarTime = time * 60 + timeOffset;

        // Hour angle (degrees)
        const hourAngle = (trueSolarTime / 4) - 180;

        const haRad = hourAngle * rad;
        const latRad = latitude * rad;

        const elevation =
            Math.asin(
                Math.sin(latRad) * Math.sin(decl) +
                Math.cos(latRad) * Math.cos(decl) * Math.cos(haRad)
            );

        return elevation / rad; // convert back to degrees
    }

    const now = new Date();
    const solarElevation = getSolarElevation(now, lat, lon);

    document.getElementById("centerSunAngle").textContent =
        Math.round(solarElevation) + "°";

    document.getElementById("centerSunAngle2").textContent =
        "Altitude";


    plotSunPosition(sunrise, sunset, uvaWindow, uvbWindow);
    updateYearProgress();
    positionSeasonTicks();

    /* ===============================
       ASTRONOMICAL MOON ENGINE
    ================================ */

    function getJulianDate(date) {
        return (date / 86400000) + 2440587.5;
    }

    function getMoonPosition(date, lat, lon) {

        const rad = Math.PI / 180;
        const deg = 180 / Math.PI;

        const JD = getJulianDate(date);
        const T = (JD - 2451545.0) / 36525;

        // Mean longitude
        let L = 218.316 + 13.176396 * (JD - 2451545.0);
        L %= 360;

        // Mean anomaly
        let M = 134.963 + 13.064993 * (JD - 2451545.0);
        M %= 360;

        // Ecliptic longitude
        const lambda = L + 6.289 * Math.sin(M * rad);

        // Obliquity
        const epsilon = 23.439 - 0.0000004 * (JD - 2451545.0);

        // Right ascension
        const RA = Math.atan2(
            Math.cos(epsilon * rad) * Math.sin(lambda * rad),
            Math.cos(lambda * rad)
        ) * deg;

        // Declination
        const Dec = Math.asin(
            Math.sin(epsilon * rad) * Math.sin(lambda * rad)
        ) * deg;

        // Sidereal time
        const GMST = 280.46061837 + 360.98564736629 * (JD - 2451545.0);
        const LST = (GMST + lon) % 360;

        const HA = (LST - RA) * rad;

        const latRad = lat * rad;
        const decRad = Dec * rad;

        const altitude = Math.asin(
            Math.sin(latRad) * Math.sin(decRad) +
            Math.cos(latRad) * Math.cos(decRad) * Math.cos(HA)
        ) * deg;

        return altitude;
    }


    /* ===============================
       FIND MOONRISE / MOONSET
    ================================ */

    function findMoonRiseSet(date, lat, lon) {

        const start = new Date(date);
        start.setHours(0,0,0,0);

        let rise = null;
        let set = null;

        let prevAlt = getMoonPosition(start, lat, lon);

        for (let h = 1; h <= 24; h++) {

            const testTime = new Date(start);
            testTime.setHours(h);

            const alt = getMoonPosition(testTime, lat, lon);

            if (prevAlt < 0 && alt >= 0 && !rise) {
                rise = new Date(testTime);
            }

            if (prevAlt >= 0 && alt < 0 && !set) {
                set = new Date(testTime);
            }

            prevAlt = alt;
        }

        return { rise, set };
    }


    /* ===============================
       MOON PHASE & ILLUMINATION
    ================================ */

    function calculateMoonPhase(date) {

        const synodicMonth = 29.53058867;
        const knownNewMoon = new Date("2000-01-06T18:14:00Z");

        const daysSince =
            (date - knownNewMoon) / (1000 * 60 * 60 * 24);

        const moonAge =
            (daysSince % synodicMonth + synodicMonth) % synodicMonth;

        const phaseFraction = moonAge / synodicMonth;

        const illumination =
            (1 - Math.cos(2 * Math.PI * phaseFraction)) / 2;

        const illuminationPercent =
            Math.round(illumination * 100);

        let phaseName;

        if (moonAge < 1) phaseName = "New Moon";
        else if (moonAge < 7.4) phaseName = "Waxing Crescent";
        else if (moonAge < 8.9) phaseName = "First Quarter";
        else if (moonAge < 14.8) phaseName = "Waxing Gibbous";
        else if (moonAge < 16.2) phaseName = "Full Moon";
        else if (moonAge < 22.1) phaseName = "Waning Gibbous";
        else if (moonAge < 23.6) phaseName = "Last Quarter";
        else phaseName = "Waning Crescent";

        const fullMoonAge = synodicMonth / 2;
        let daysUntilFull = fullMoonAge - moonAge;
        if (daysUntilFull < 0) daysUntilFull += synodicMonth;

        return {
            phaseName,
            illuminationPercent,
            daysUntilFull: Math.round(daysUntilFull)
        };
    }


    /* ===============================
       UPDATE MOON PANEL
    ================================ */

    const moonPhase = calculateMoonPhase(now);

    const moonAltitude = getMoonPosition(now, lat, lon);    

    const moonVisible = (moonAltitude > 0 ? true : false);

    const moonRiseSet = findMoonRiseSet(now, lat, lon);

    document.getElementById("moonPhase").textContent =
        moonPhase.phaseName;

    document.getElementById("moonIllumination").textContent =
       "Illumination: " + moonPhase.illuminationPercent + "%";

   document.getElementById("moonIlluminationFill").style.width =
        moonPhase.illuminationPercent + "%";

    document.getElementById("moonAltitude").textContent =
       "Altitude: " + Math.round(moonAltitude) + "°";

    document.getElementById("moonNextFull").textContent =
        "Next Full Moon: " + moonPhase.daysUntilFull + " days";

    document.getElementById("moonVisible").textContent =
        "Visible: " + (moonVisible ? "Yes" : "No");

    document.getElementById("moonRiseSet").textContent = 
        (moonVisible ?  "Moonset: " + formatTime(moonRiseSet.set) :
                        "Moonrise: " + formatTime(moonRiseSet.rise));
        

    /* ==================================
       Simple Moon Phase Visualization
    ===================================== */

    const shadow = document.getElementById("moonShadow");

    // Convert illumination to shadow position
    // 0% = full shadow, 100% = no shadow
    const shadowOffset = (100 - moonPhase.illuminationPercent);

    shadow.style.width = shadowOffset + "%";

    // Flip for waxing vs waning
    if(moonPhase.phaseName.toLowerCase().includes("waxing")){
      shadow.style.left = "0";
    } else {
      shadow.style.left = "auto";
      shadow.style.right = "0";
    }


    // timestamp
    startElapsedTimer();

});


/* ================
  THERMOMETER 
  =================*/
function updateThermometer(tempF) {

    const min = -20;
    const max = 120;

    // Clamp temperature within range
    const clamped = Math.max(min, Math.min(max, tempF));

    // Convert to percentage position
    const percent = (clamped - min) / (max - min);

    const track = document.getElementById("thermometerTrack");
    const marker = document.getElementById("tempMarker");

    const trackWidth = track.offsetWidth;

    marker.style.left = (percent * trackWidth - 1.5) + "px";
}

function createTickMarks() {
    const tickContainer = document.getElementById("tickMarks");
    const min = -20;
    const max = 120;
    const step = 20;

    for (let t = min; t <= max; t += step) {
        const percent = (t - min) / (max - min);

        const tick = document.createElement("div");
        tick.style.position = "absolute";
        tick.style.left = (percent * 100) + "%";
        tick.style.top = "0";
        tick.style.width = "2px";
        tick.style.height = "100%";
        tick.style.background = "rgba(0,0,0,0.4)";

        if (t >= 0 && t <= 100) {
          tickContainer.appendChild(tick);
        }
    }
}

createTickMarks();

/* ---------------- Helper Functions ---------------- */

function findUVWindow(times, values, threshold) {
    let start = null;
    let end = null;

    for (let i = 0; i < values.length; i++) {
        if (values[i] >= threshold) {
            if (!start) start = times[i];
            end = times[i];
        }
    }

    if (!start) return "None";

    return formatTime(start) + " – " + formatTime(end);
}

/* ============================
   SOLAR ARC VISUALIZATION
============================== */
function plotSunPosition(sunrise,sunset,uvaWindow,uvbWindow){

  const now = new Date();
  const midnight = new Date();
  midnight.setHours(0,0,0,0);

  const nextMidnight = new Date(midnight);
  nextMidnight.setDate(nextMidnight.getDate()+1);

  const totalDay = nextMidnight - midnight;

  const cx=150, cy=150, r=120;

  const solarNoon =
    new Date((sunrise.getTime()+sunset.getTime())/2);

  const noonPercent =
    (solarNoon-midnight)/totalDay;

  const rotation =
    (-Math.PI/2)-(noonPercent*2*Math.PI);

  /* SUN POSITION */
  const percentNow =
    (now-midnight)/totalDay;

  const angle =
    percentNow*2*Math.PI+rotation;

  document.getElementById("sunMarker")
    .setAttribute("cx",cx+r*Math.cos(angle));
  document.getElementById("sunMarker")
    .setAttribute("cy",cy+r*Math.sin(angle));


  /* DAY ARC */
  const sunriseP=(sunrise-midnight)/totalDay;
  const sunsetP=(sunset-midnight)/totalDay;

  const a1=sunriseP*2*Math.PI+rotation;
  const a2=sunsetP*2*Math.PI+rotation;

  const x1=cx+r*Math.cos(a1);
  const y1=cy+r*Math.sin(a1);
  const x2=cx+r*Math.cos(a2);
  const y2=cy+r*Math.sin(a2);

  document.getElementById("daySegment")
    .setAttribute("d",
      `M ${x1} ${y1}
       A ${r} ${r} 0 0 1 ${x2} ${y2}`);

  /* =========================
     SLEEP ARC (11PM → Sunrise)
  ========================= */

  const sleepStart = new Date(midnight);
  //sleepStart.setHours(23,0,0,0); // 11:00 PM
  sleepStart.setHours(22,30,0,0); // 10:30 PM

  // If sunrise is before 11PM (normal case), it is next day wrap
  let sleepEnd = new Date(sunrise);

  let sleepStartP = (sleepStart - midnight) / totalDay;
  let sleepEndP   = (sleepEnd - midnight) / totalDay;

  // If sunrise happens after midnight (normal),
  // its percent will be small (like 0.25).
  // So if end < start, we wrap across midnight.
  if (sleepEndP < sleepStartP) {
    sleepEndP += 1;
  }

  const sleepA1 = sleepStartP * 2*Math.PI + rotation;
  const sleepA2 = sleepEndP   * 2*Math.PI + rotation;

  const sx1 = cx + r * Math.cos(sleepA1);
  const sy1 = cy + r * Math.sin(sleepA1);
  const sx2 = cx + r * Math.cos(sleepA2);
  const sy2 = cy + r * Math.sin(sleepA2);

  // Large arc flag if arc spans > 180°
  const sleepArcAngle = sleepA2 - sleepA1;
  const largeArcFlag = sleepArcAngle > Math.PI ? 1 : 0;

  document.getElementById("sleepSegment")
    .setAttribute("d",
      `M ${sx1} ${sy1}
       A ${r} ${r} 0 ${largeArcFlag} 1 ${sx2} ${sy2}`);


  /* =========================
     UVA ARC
  ========================= */

  const uvaStartP = (uvaWindow.start - midnight) / totalDay;
  const uvaEndP   = (uvaWindow.end - midnight) / totalDay;

  const uvaR = r;
  //const uvaR = r - 12;   // between sun arc and UVB arc

  const uvaA1 = uvaStartP * 2*Math.PI + rotation;
  const uvaA2 = uvaEndP   * 2*Math.PI + rotation;

  const uvaX1 = cx + uvaR * Math.cos(uvaA1);
  const uvaY1 = cy + uvaR * Math.sin(uvaA1);
  const uvaX2 = cx + uvaR * Math.cos(uvaA2);
  const uvaY2 = cy + uvaR * Math.sin(uvaA2);

  document.getElementById("uvaSegment")
    .setAttribute("d",
      `M ${uvaX1} ${uvaY1}
       A ${uvaR} ${uvaR} 0 0 1 ${uvaX2} ${uvaY2}`);


 /* =========================
     UVB ARC
  ========================= */

  const uvbStartP = (uvbWindow.start - midnight) / totalDay;
  const uvbEndP   = (uvbWindow.end - midnight) / totalDay;

  const innerR = r;
  //const innerR = r - 20;

  const ua1 = uvbStartP * 2*Math.PI + rotation;
  const ua2 = uvbEndP   * 2*Math.PI + rotation;

  const ux1 = cx + innerR * Math.cos(ua1);
  const uy1 = cy + innerR * Math.sin(ua1);
  const ux2 = cx + innerR * Math.cos(ua2);
  const uy2 = cy + innerR * Math.sin(ua2);

  document.getElementById("uvbSegment")
    .setAttribute("d",
      `M ${ux1} ${uy1}
       A ${innerR} ${innerR} 0 0 1 ${ux2} ${uy2}`);


  /* =========================
     BREAKFAST ARC
     Sunrise → +1 hour
  ========================= */

  const breakfastStart = new Date(sunrise);
  const breakfastEnd = new Date(sunrise.getTime() + 60*60*1000);

  const breakfastR = r - 22;   // inside main ring

  const breakfastStartP = (breakfastStart - midnight) / totalDay;
  const breakfastEndP   = (breakfastEnd - midnight) / totalDay;

  const bA1 = breakfastStartP * 2*Math.PI + rotation;
  const bA2 = breakfastEndP   * 2*Math.PI + rotation;

  const bx1 = cx + breakfastR * Math.cos(bA1);
  const by1 = cy + breakfastR * Math.sin(bA1);
  const bx2 = cx + breakfastR * Math.cos(bA2);
  const by2 = cy + breakfastR * Math.sin(bA2);

  document.getElementById("breakfastSegment")
    .setAttribute("d",
      `M ${bx1} ${by1}
       A ${breakfastR} ${breakfastR} 0 0 1 ${bx2} ${by2}`);



  /* =========================
     DINNER ARC
     -1 hour → Sunset
  ========================= */

  const dinnerEnd = new Date(sunset);
  const dinnerStart = new Date(sunset.getTime() - 60*60*1000);

  const dinnerR = r - 22;

  const dinnerStartP = (dinnerStart - midnight) / totalDay;
  const dinnerEndP   = (dinnerEnd - midnight) / totalDay;

  const dA1 = dinnerStartP * 2*Math.PI + rotation;
  const dA2 = dinnerEndP   * 2*Math.PI + rotation;

  const dx1 = cx + dinnerR * Math.cos(dA1);
  const dy1 = cy + dinnerR * Math.sin(dA1);
  const dx2 = cx + dinnerR * Math.cos(dA2);
  const dy2 = cy + dinnerR * Math.sin(dA2);

  document.getElementById("dinnerSegment")
    .setAttribute("d",
      `M ${dx1} ${dy1}
       A ${dinnerR} ${dinnerR} 0 0 1 ${dx2} ${dy2}`);


  /* =========================
     BREAKFAST LABEL
  ========================= */

  const breakfastMid = (bA1 + bA2) / 2;
  const labelR = breakfastR;

  const blx = cx + labelR * Math.cos(breakfastMid);
  const bly = cy + labelR * Math.sin(breakfastMid);

  const breakfastLabel = document.getElementById("breakfastLabel");

  breakfastLabel.setAttribute("x", blx);
  breakfastLabel.setAttribute("y", bly);

  // Rotate to follow arc
  //const breakfastDeg = breakfastMid * (180 / Math.PI) + 90;
  let breakfastDeg = breakfastMid * (180 / Math.PI) + 90;
  if (breakfastDeg > 180) breakfastDeg -= 180;

  breakfastLabel.setAttribute(
    "transform",
    `rotate(${breakfastDeg} ${blx} ${bly})`
  );


  /* =========================
     DINNER LABEL
  ========================= */

  const dinnerMid = (dA1 + dA2) / 2;

  const dlx = cx + labelR * Math.cos(dinnerMid);
  const dly = cy + labelR * Math.sin(dinnerMid);

  const dinnerLabel = document.getElementById("dinnerLabel");

  dinnerLabel.setAttribute("x", dlx);
  dinnerLabel.setAttribute("y", dly);

  // Rotate to follow arc
  //const dinnerDeg = dinnerMid * (180 / Math.PI) + 90;
  let dinnerDeg = dinnerMid * (180 / Math.PI) + 90;
  if (dinnerDeg > 180) dinnerDeg -= 180;


  dinnerLabel.setAttribute(
    "transform",
    `rotate(${dinnerDeg} ${dlx} ${dly})`
  );


  /* =========================
     SUN ANGLE (Approximation)
  ========================= *

  let sunAngleDeg = 0;

  if (now >= sunrise && now <= sunset) {

    const daylightProgress =
      (now - sunrise) / (sunset - sunrise);

    const elevation =
      Math.sin(daylightProgress * Math.PI);

    sunAngleDeg = Math.round(elevation * 70);
  }

  /* =========================
     SUNRISE / SUNSET DOTS
  ========================= */

  const sunriseAngle = sunriseP * 2 * Math.PI + rotation;
  const sunsetAngle  = sunsetP  * 2 * Math.PI + rotation;

  const srX = cx + r * Math.cos(sunriseAngle);
  const srY = cy + r * Math.sin(sunriseAngle);

  const ssX = cx + r * Math.cos(sunsetAngle);
  const ssY = cy + r * Math.sin(sunsetAngle);

  const sunriseDot = document.getElementById("sunriseDot");
  const sunsetDot  = document.getElementById("sunsetDot");

  sunriseDot.setAttribute("cx", srX);
  sunriseDot.setAttribute("cy", srY);

  sunsetDot.setAttribute("cx", ssX);
  sunsetDot.setAttribute("cy", ssY);

  /* =================================
     SOLAR NOON MARKER (Centered)
  ==================================== */

  // Force to visual top of circle
  const noonAngle = -Math.PI / 2;  // 12 o'clock
  const nx = cx + (r + 18) * Math.cos(noonAngle);
  const ny = cy + (r + 18) * Math.sin(noonAngle);

  // Triangle
  document.getElementById("noonMarker")
    .setAttribute("points",
      `${nx},${ny}
       ${nx-6},${ny-12}
       ${nx+6},${ny-12}`);

  /* =========================
     MIDNIGHT DOT
  ========================= */

  const mx = cx + r * Math.cos(rotation);
  const my = cy + r * Math.sin(rotation);

  document.getElementById("midnightMarker")
    .setAttribute("cx", mx);

  document.getElementById("midnightMarker")
    .setAttribute("cy", my);


    // Daylight & Sleep Labels
    updateCycleLabels(sunrise, sunset);

    // UV TOGGLE
    toggleUVPanel(sunrise, sunset);
  
}




/* ======================
    DAYLIGHT & SLEEP
========================*/
function updateCycleLabels(sunrise, sunset){

  const now = new Date();

  const midnight = new Date();
  midnight.setHours(0,0,0,0);

  const nextMidnight = new Date(midnight);
  nextMidnight.setDate(nextMidnight.getDate()+1);

  const totalDay = nextMidnight - midnight;

  /* =========================
     ROUND TO 15 MINUTES
  ========================= */
  function roundTo15(minutes){
    return Math.round(minutes / 15) * 15;
  }

  function formatHoursMinutes(totalMinutes){
    const hrs = Math.floor(totalMinutes / 60);
    const mins = totalMinutes % 60;
    return `${hrs} hrs and ${mins}m`;
  }

  /* =========================
     DAYLIGHT LOGIC
  ========================= */

  const daylightDuration = (sunset - sunrise) / 60000; // in minutes

  let daylightText;

  if(now < sunrise){
    const rounded = roundTo15(daylightDuration);
    daylightText =
      "Daylight: " +
      formatHoursMinutes(rounded) +
      " available";
  }
  else if(now >= sunrise && now <= sunset){
    const remaining = (sunset - now) / 60000;
    const rounded = roundTo15(remaining);
    daylightText =
      "Daylight: " +
      formatHoursMinutes(rounded) +
      " remaining";
  }
  else{
    daylightText = "Daylight complete • Bedtime: 10:30 PM";
  }

  document.getElementById("daylightLabel")
    .textContent = daylightText;


  /* =========================
     SLEEP LOGIC
     10:30 PM → Sunrise
  ========================= */

  const sleepStart = new Date(midnight);
  sleepStart.setHours(22,30,0,0);

  let sleepEnd = new Date(sunrise);
  sleepEnd.setDate(sleepEnd.getDate()+1);

  const sleepDuration = (sleepEnd - sleepStart) / 60000;

  let sleepText;

  if(now < sleepStart){
    const rounded = roundTo15(sleepDuration);
    sleepText =
      "Sleep: " +
      formatHoursMinutes(rounded) +
      " available";
  }
  else if(now >= sleepStart && now < sleepEnd){
    const remaining = (sleepEnd - now) / 60000;
    const rounded = roundTo15(remaining);
    sleepText =
      "Sleep: " +
      formatHoursMinutes(rounded) +
      " remaining";
  }
  else{
    sleepText = "Sleep window complete";
  }

  document.getElementById("sleepCycleLabel")
    .textContent = sleepText;
}



/* =========================
   YEAR PROGRESS
========================= */

function updateYearProgress(){

  const now = new Date();
  const start = new Date(now.getFullYear(),0,1);
  const end   = new Date(now.getFullYear()+1,0,1);

  const percent =
    (now - start) / (end - start);

  const bar = document.getElementById("yearBar");
  const arrow = document.getElementById("yearArrow");

  const barWidth = bar.offsetWidth;

  arrow.style.left =
    (percent * barWidth) + "px";
}

/* =========================
   SEASON TICKS
========================= */

function positionSeasonTicks(){

  const year = new Date().getFullYear();
  const start = new Date(year,0,1);
  const end   = new Date(year+1,0,1);

  function percentOfYear(date){
    return (date - start) / (end - start);
  }

  const spring = new Date(year,2,20);
  const summer = new Date(year,5,21);
  const fall   = new Date(year,8,22);
  const winter = new Date(year,11,21);

  const bar = document.getElementById("yearBar");
  const width = bar.offsetWidth;

  document.getElementById("springMarker").style.left =
    percentOfYear(spring) * width + "px";

  document.getElementById("summerMarker").style.left =
    percentOfYear(summer) * width + "px";

  document.getElementById("fallMarker").style.left =
    percentOfYear(fall) * width + "px";

  document.getElementById("winterMarker").style.left =
    percentOfYear(winter) * width + "px";
}

// Only show UV panel during the day
function toggleUVPanel(sunrise, sunset){

  const now = new Date();
  const uvPanel = document.getElementById("uvPanel");

  if(!uvPanel) return;

  if(now >= sunrise && now <= sunset){
    uvPanel.style.display = "block";
  } else {
    uvPanel.style.display = "none";
    console.log("UV Panel Hidden");
  }
}
